name: tests

# Per project policy CI only runs against the integration branches:
# every PR merging *into* main or dev gets exercised; in-flight feature
# branches don't burn CI minutes per push.
on:
  pull_request:
    branches: [main, dev]

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          # Submodules are needed because the click_plc package is consumed
          # as one and tests/click/* import it.  We don't run the click
          # integration scripts here (they need .ckp fixtures from demo/)
          # -- the IL / lowering / emitter tests cover the pure-IL surface.
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (with dev extras)
        # [dev] pulls in pytest + pytest-cov + xmlschema (needed for the
        # PLCopen TC6 XSD validation tests).
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pytest
        run: |
          pytest tests/il/ tests/lowering/ tests/emitters/ -q
