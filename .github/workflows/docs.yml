name: docs

# Build mkdocs site on every PR + push to main / dev (so broken
# docs surface in CI), deploy to GitHub Pages only from main.
#
# Build-only on PR ensures we don't merge a PR that breaks the
# docs build, even if no .md files changed (the autodoc API
# reference is generated from live Python signatures, so any
# rename / removal in the package would also break docs).

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build mkdocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install with docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build site
        # Not --strict; the existing docs contain source-tree links
        # (``../universal_machinery/il/sfc.py``) that mkdocs warns
        # on but aren't errors.  A future doc PR can route those
        # through GitHub URLs to make --strict feasible.
        run: mkdocs build

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
