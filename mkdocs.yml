site_name: universal_machinery
site_description: Open-source toolkit for programming PLCs across vendors via a vendor-neutral intermediate language
site_url: https://iliathebutterfly.github.io/universal_machinery/
repo_url: https://github.com/IliTheButterfly/universal_machinery
repo_name: IliTheButterfly/universal_machinery

# Existing markdown docs already live in ``docs/`` and are wired
# into the nav below.  Library API reference is auto-generated by
# mkdocstrings from the docstrings in ``universal_machinery/``.

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            # Pull docstrings + signatures from the live package.
            # Defaults are reasonable; explicit options here document
            # the contract we're rendering against.
            docstring_style: sphinx
            show_root_heading: true
            show_root_full_path: false
            show_source: false           # link to GitHub instead
            members_order: source
            heading_level: 3
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true

markdown_extensions:
  # Material theme essentials
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - attr_list
  - toc:
      permalink: true

nav:
  - Overview:
      - index.md
      - Architecture: ARCHITECTURE.md
  - Conformance:
      - IEC 61131-3 conformance: IEC_CONFORMANCE.md
      - Conformance test plan: CONFORMANCE_TEST_PLAN.md
      - API stability: API_STABILITY.md
      - CLICK calling convention: click_calling_convention.md
  - API reference:
      - api/index.md
      - IL (intermediate language): api/il.md
      - Builders: api/builders.md
      - Emitters: api/emitters.md
      - Parsers: api/parsers.md
      - Validation: api/validation.md
      - Serialisation: api/serialisation.md
      - Backends: api/backends.md
      - Exceptions: api/exceptions.md
      - Lowering: api/lowering.md
      - CLI: api/cli.md
